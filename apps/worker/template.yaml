AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Daily Garmin sync — sessions, auto-tags, checkpoints, summaries

Parameters:
  SsmPrefix:
    Type: String
    Default: /oefen/worker
    Description: SSM Parameter Store prefix for worker configuration
  SummarizerFunctionName:
    Type: String
    Default: oefen-summary
    Description: Summary Lambda to invoke when a new checkpoint is frozen

Globals:
  Function:
    Timeout: 300
    Runtime: nodejs22.x
    MemorySize: 256
    Environment:
      Variables:
        SSM_PREFIX: !Ref SsmPrefix
        SUMMARIZER_FUNCTION_NAME: !Ref SummarizerFunctionName

Resources:
  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: oefen-worker
      Handler: main.handler
      CodeUri: ../../dist/apps/worker-lambda
      Description: Daily Garmin sync via syncGarmin (sessions, tags, checkpoints)
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmPrefix}/*'
            - Effect: Allow
              Action: ssm:PutParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmPrefix}/garmin-tokens'
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${SummarizerFunctionName}'

  WorkerScheduleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeWorkerFunction
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt WorkerFunction.Arn

  WorkerSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: oefen-worker-daily
      Description: Sync Garmin data once per day at 9:00 AM US Eastern
      ScheduleExpression: cron(0 9 * * ? *)
      ScheduleExpressionTimezone: America/New_York
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn: !GetAtt WorkerFunction.Arn
        RoleArn: !GetAtt WorkerScheduleRole.Arn
