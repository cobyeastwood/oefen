AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Checkpoint summary generator (Mastra agent)

Parameters:
  SsmPrefix:
    Type: String
    Default: /oefen/summary
    Description: SSM Parameter Store prefix for summary configuration

Globals:
  Function:
    Timeout: 60
    Runtime: nodejs22.x
    MemorySize: 512
    LoggingConfig:
      LogFormat: JSON
    Environment:
      Variables:
        SSM_PREFIX: !Ref SsmPrefix

Resources:
  SummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: oefen-summary
      Handler: main.handler
      CodeUri: ../../dist/apps/summary
      Description: Generate checkpoint summaries via Mastra agent
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmPrefix}/*'

Outputs:
  SummaryFunctionArn:
    Description: Summary Lambda ARN
    Value: !GetAtt SummaryFunction.Arn
